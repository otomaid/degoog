<div class="command-result weather-result" data-hourly="{{hourlyJson}}">
  <h3 class="weather-location">{{locationName}}</h3>
  <div class="weather-hero">
    <span class="weather-hero-icon"><i class="ti {{mainIcon}}"></i></span>
    <div class="weather-hero-text">
      <p class="weather-temp">{{temp}} <span class="weather-desc">{{desc}}</span></p>
      <p class="weather-feels">Feels like {{feels}} &middot; H {{high}} / L {{low}}</p>
    </div>
  </div>
  <div class="weather-now-grid">
    <div class="weather-now-item"><i class="ti ti-droplet weather-now-icon"></i><span class="weather-value">{{humidity}}</span></div>
    <div class="weather-now-item"><i class="ti ti-wind weather-now-icon"></i><span class="weather-value">{{wind}}</span></div>
    <div class="weather-now-item"><i class="ti ti-gauge weather-now-icon"></i><span class="weather-value">{{pressure}}</span></div>
    <div class="weather-now-item"><i class="ti ti-cloud weather-now-icon"></i><span class="weather-value">{{cloudCover}}</span></div>
    <div class="weather-now-item"><i class="ti ti-eye weather-now-icon"></i><span class="weather-value">{{visibility}}</span></div>
    <div class="weather-now-item"><i class="ti ti-sun weather-now-icon"></i><span class="weather-value">{{uv}} UV</span></div>
    <div class="weather-now-item"><i class="ti ti-sunrise weather-now-icon"></i><span class="weather-value">{{todaySunrise}}</span></div>
    <div class="weather-now-item"><i class="ti ti-sunset weather-now-icon"></i><span class="weather-value">{{todaySunset}}</span></div>
  </div>
  <h4 class="weather-week-heading">7-day <span class="weather-week-hint">click a day for hourly</span></h4>
  <div class="weather-week-wrap">
    <table class="weather-week">
      <thead>
        <tr>
          <th>Day</th>
          <th></th>
          <th>High / Low</th>
          <th>Precip</th>
        </tr>
      </thead>
      <tbody>{{weekRows}}</tbody>
    </table>
  </div>
</div>
